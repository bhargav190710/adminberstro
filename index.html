<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Golden Fork</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <style>
        .order-card { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans p-6">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight">Incoming Orders</h1>
                <p class="text-slate-500 font-medium">Real-time Kitchen Dashboard</p>
            </div>
            <div class="text-right">
                <p class="text-xs uppercase font-bold text-slate-400 mb-1">Total Revenue Today</p>
                <p id="total-revenue" class="text-2xl font-black text-green-600">₹0</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-orange-500 p-6 rounded-3xl text-white shadow-lg shadow-orange-500/20">
                <p class="text-sm font-bold opacity-80 uppercase">Pending Orders</p>
                <p id="pending-count" class="text-4xl font-black mt-2">0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                <p class="text-sm font-bold text-slate-400 uppercase">Completed</p>
                <p id="completed-count" class="text-4xl font-black mt-2">0</p>
            </div>
            <button onclick="location.reload()" class="bg-slate-900 text-white rounded-3xl font-bold hover:bg-slate-800 transition">
                Refresh Dashboard
            </button>
        </div>

        <div id="order-feed" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="col-span-full py-20 text-center">
                <p class="text-slate-400 font-medium italic">Listening for orders...</p>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
